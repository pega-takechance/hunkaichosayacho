<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ニホンジカ糞塊密度調査アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="糞塊調査">
    <link rel="apple-touch-icon" href="icon.svg">
</head>
<body class="antialiased min-h-screen pb-24">
    <!-- Header -->
    <header class="glass-header text-white sticky top-0 z-50 p-4 shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold tracking-wider font-['Outfit']">DeerSurveyPro</h1>
            <p class="text-xs text-emerald-100 mt-0.5">ニホンジカ糞塊密度調査システム</p>
        </div>
        <button id="export-excel-btn" class="bg-white text-emerald-700 px-4 py-2 rounded-full font-bold text-sm shadow-sm hover:bg-emerald-50 active:scale-95 transition-all flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            Excel出力
        </button>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-6">
        <!-- 基本情報セクション -->
        <section class="glass-card p-5 animate-slide-up" style="animation-delay: 0.1s;">
            <div class="flex items-center gap-2 mb-4">
                <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <h2 class="text-lg font-bold text-slate-800">調査基本情報</h2>
            </div>
            
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">調査日</label>
                        <input type="date" id="form-date" class="custom-input w-full border border-slate-200 rounded-xl p-3 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">天気</label>
                        <input type="text" id="form-weather" placeholder="例: 晴れ" class="custom-input w-full border border-slate-200 rounded-xl p-3 outline-none text-sm">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">開始時刻</label>
                        <input type="time" id="form-time-start" class="custom-input w-full border border-slate-200 rounded-xl p-3 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">終了時刻</label>
                        <input type="time" id="form-time-end" class="custom-input w-full border border-slate-200 rounded-xl p-3 outline-none text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">調査者</label>
                        <input type="text" id="form-surveyor" placeholder="氏名" class="custom-input w-full border border-slate-200 rounded-xl p-3 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">調査メッシュNo.</label>
                        <input type="text" id="form-mesh" placeholder="M-1234 等" class="custom-input w-full border border-slate-200 rounded-xl p-3 outline-none text-sm">
                    </div>
                </div>

                <div class="pt-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">調査不能箇所</label>
                    <div class="flex gap-4 p-1 bg-slate-100 rounded-xl w-fit">
                        <label class="relative flex-1 text-center cursor-pointer radio-group">
                            <input type="radio" name="form-impossible" value="有" class="peer sr-only">
                            <span class="block px-6 py-2 text-sm text-slate-600 rounded-lg peer-checked:bg-white peer-checked:text-emerald-700 peer-checked:shadow-sm transition-all">有</span>
                        </label>
                        <label class="relative flex-1 text-center cursor-pointer radio-group">
                            <input type="radio" name="form-impossible" value="無" class="peer sr-only" checked>
                            <span class="block px-6 py-2 text-sm text-slate-600 rounded-lg peer-checked:bg-white peer-checked:text-emerald-700 peer-checked:shadow-sm transition-all">無</span>
                        </label>
                    </div>
                </div>
            </div>
        </section>

        <!-- ガイド枠 -->
        <div class="border border-emerald-100 bg-emerald-50 text-emerald-800 rounded-xl p-4 text-xs leading-relaxed animate-slide-up" style="animation-delay: 0.2s;">
            <div class="font-bold mb-1 flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                植生タイプの凡例 (代表3種まで)
            </div>
            A:落葉広葉樹林 / B:常緑広葉樹林 / C:マツ林 / D:伐採跡地 / E:スギ・ヒノキ幼齢林 / F:スギ・ヒノキ老齢林 / G:スギ・ヒノキ植林(制限等無) / H:草地 / I:カラマツ林 / J:常緑針葉樹林 / K:竹林 / L:その他
        </div>

        <div class="flex items-center justify-between mt-8 mb-4 animate-slide-up" style="animation-delay: 0.3s;">
            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                区域データ
            </h2>
            <span class="text-sm font-medium bg-slate-200 text-slate-700 px-3 py-1 rounded-full"><span id="area-count">0</span> 区域</span>
        </div>

        <!-- Areas Container -->
        <div id="areas-container" class="space-y-6">
            <!-- JS dynamically inserts cards here -->
        </div>

        <!-- Add Area Button -->
        <button type="button" id="add-area-btn" class="w-full py-4 mt-8 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-[0_8px_16px_rgba(4,120,87,0.2)] transition-all active:scale-[0.98] flex justify-center items-center gap-2 animate-slide-up" style="animation-delay: 0.4s;">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            区域を追加する
        </button>

    </main>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered!'))
                    .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>
</body>
</html>
